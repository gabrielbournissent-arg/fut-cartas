.label { font-size:12px; text-transform:uppercase; letter-spacing:0.08em; color:var(--chalk-dim); margin-bottom:6px; display:block; font-family:'Space Mono',monospace; }

.tabs { display:flex; gap:8px; margin-bottom:18px; }
.tab { flex:1; text-align:center; padding:10px; border-radius:8px; font-family:'Oswald',sans-serif; text-transform:uppercase; font-size:13px; cursor:pointer; border:1.5px solid var(--pitch-line); color:var(--chalk-dim); }

.err { color:#FF8A73; font-size:13px; margin:-4px 0 12px; }
.ok { color:#7CE0A6; font-size:13px; margin:-4px 0 12px; }

.stat-cards { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px; }

.stat-card .lbl { font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--chalk-dim); margin-top:2px; }

.card-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.mini-card { background:linear-gradient(160deg,#17402A,#0E2A1F); border:1px solid rgba(255,209,102,0.2); border-radius:10px; padding:12px; }
.mini-card.rareza-plata { border-color: var(--silver); box-shadow: 0 0 0 1px var(--silver); }
.mini-card.rareza-oro { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold); }

.mini-team { font-size:10px; color:var(--chalk-dim); font-family:'Space Mono',monospace; text-transform:uppercase; margin-bottom:6px; }
.mini-stats { display:flex; flex-wrap:wrap; gap:4px; }
.mini-stat { font-size:10px; font-family:'Space Mono',monospace; background:rgba(0,0,0,0.25); padding:2px 6px; border-radius:4px; color:var(--chalk-dim); }

.small-note { font-size:12px; color:var(--chalk-dim); text-align:center; margin-top:10px; line-height:1.5; }
.top-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.logout-link { font-size:12px; color:var(--chalk-dim); text-decoration:underline; cursor:pointer; background:none; border:none; font-family:'Inter',sans-serif; }

const ALL_TEAMS = [...new Set(REAL_PLAYERS.map(p => p.team))].sort();

function shuffle(arr){
  const a = arr.slice();
  for (let i=a.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
async function getAllowedTeams(){
  try {
    const snap = await getDoc(doc(db, 'config', 'deckSettings'));
    if (snap.exists() && Array.isArray(snap.data().allowedTeams) && snap.data().allowedTeams.length > 0) {
      return snap.data().allowedTeams;
    }
  } catch(e) { /* si falla, se usa el pool completo */ }
  return null; // null = todos los equipos habilitados
}
async function randomStarterDeck(n=20){
  const allowedTeams = await getAllowedTeams();
  const pool = allowedTeams ? REAL_PLAYERS.filter(p => allowedTeams.includes(p.team)) : REAL_PLAYERS;
  const source = pool.length >= n ? pool : REAL_PLAYERS; // si el pool filtrado quedó muy chico, se completa con todos
  return shuffle(source).slice(0,n).map((c,i) => ({
    id: 'c_' + Date.now().toString(36) + '_' + i,
    name: c.name, team: c.team, pos: c.pos, stats: c.stats, rareza: 'normal'
  }));
}
function normalizeUsername(u){
  return u.trim().toLowerCase().replace(/[^a-z0-9_.]/g, '');
}
function usernameToEmail(u){
  return normalizeUsername(u) + '@' + PLAYER_EMAIL_DOMAIN;
}

function renderPlayerLogin(){
  const wrap = h(`<div>

    <div class="sub">Ingresá con el usuario y el código que te dio tu administrador para empezar a jugar.</div>

      <button class="btn btn-primary" id="f-submit" ${busy?'disabled':''}>${busy ? 'Entrando…' : 'Entrar'}</button>
    </div>
    <span class="link-small" id="go-admin">¿Sos el administrador? Ingresar con tu correo</span>
  </div>`);
  wrap.querySelector('#go-admin').onclick = () => { screen='admin-login'; formError=''; render(renderAdminLogin('login')); };
  wrap.querySelector('#f-submit').onclick = async () => {
    const user = wrap.querySelector('#f-user').value;
    const pin = wrap.querySelector('#f-pin').value;
    if (!user.trim() || !pin) { formError = 'Completá tu usuario y tu código.'; render(renderPlayerLogin()); return; }
    busy = true; formError=''; render(renderPlayerLogin());
    try {
      await signInWithEmailAndPassword(auth, usernameToEmail(user), pin);
    } catch (e) {
      formError = traducirError(e.code) || 'Usuario o código incorrectos.';
      busy = false; render(renderPlayerLogin());
      return;
    }
    busy = false;
  };
  return wrap;
}

// -------- Pantalla: acceso de administrador (correo + contraseña) --------
function renderAdminLogin(mode){
  const wrap = h(`<div>
    <div class="eyebrow">Acceso administrador</div>
    <div class="h1" style="font-size:28px;">Futcartas</div>
    <div class="sub">Uso exclusivo del administrador (adulto responsable). Los jugadores ingresan con usuario y código en la pantalla anterior.</div>
    <div class="panel">
      <div class="tabs">
        <div class="tab ${mode==='login'?'active':''}" id="tab-login">Iniciar sesión</div>
        <div class="tab ${mode==='register'?'active':''}" id="tab-register">Crear cuenta admin</div>
      </div>
      ${mode==='register' ? `<label class="label">Nombre</label><input class="input" id="f-name" placeholder="Tu nombre"/>` : ''}
      <label class="label">Correo electrónico</label>
      <input class="input" id="f-email" type="email" placeholder="tu@correo.com"/>
      <label class="label">Contraseña</label>
      <input class="input" id="f-pass" type="password" placeholder="Mínimo 6 caracteres"/>
      ${formError ? `<div class="err">${formError}</div>` : ''}
      <button class="btn btn-primary" id="f-submit" ${busy?'disabled':''}>${busy ? 'Procesando…' : (mode==='login' ? 'Iniciar sesión' : 'Crear cuenta')}</button>
    </div>
    <span class="link-small" id="go-player">Volver al acceso de jugadores</span>
  </div>`);
  wrap.querySelector('#tab-login').onclick = () => { formError=''; render(renderAdminLogin('login')); };
  wrap.querySelector('#tab-register').onclick = () => { formError=''; render(renderAdminLogin('register')); };
  wrap.querySelector('#go-player').onclick = () => { screen='player-login'; formError=''; render(renderPlayerLogin()); };
  wrap.querySelector('#f-submit').onclick = async () => {
    const email = wrap.querySelector('#f-email').value.trim();
    const pass = wrap.querySelector('#f-pass').value;
    const nameEl = wrap.querySelector('#f-name');
    const name = nameEl ? nameEl.value.trim() : '';
    if (!email || !pass) { formError = 'Completá correo y contraseña.'; render(renderAdminLogin(mode)); return; }
    if (mode === 'register' && !name) { formError = 'Poné tu nombre.'; render(renderAdminLogin(mode)); return; }
    busy = true; formError=''; render(renderAdminLogin(mode));
    try {
      if (mode === 'register') {
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        await updateProfile(cred.user, { displayName: name });
        await setDoc(doc(db, 'users', cred.user.uid), {
          uid: cred.user.uid, name, email,
          points: 0, role: 'player', // se eleva a 'admin' manualmente en Firestore la primera vez
          blocked: false, blockType: null, rating: null, medals: [],
          cards: await randomStarterDeck(20),
          createdAt: serverTimestamp(),
        });
      } else {
        await signInWithEmailAndPassword(auth, email, pass);
      }
    } catch (e) {
      formError = traducirError(e.code);
      busy = false; render(renderAdminLogin(mode));
      return;
    }
    busy = false;
  };
  return wrap;
}

function traducirError(code){
  const map = {
    'auth/email-already-in-use': 'Ese usuario o correo ya existe.',
    'auth/invalid-email': 'El dato ingresado no es válido.',
    'auth/weak-password': 'El código/contraseña necesita al menos 6 caracteres.',
    'auth/user-not-found': 'No existe esa cuenta.',
    'auth/wrong-password': 'El código o la contraseña son incorrectos.',
    'auth/invalid-credential': 'Usuario/correo o código/contraseña incorrectos.',
  };
  return map[code] || 'Ocurrió un error. Probá de nuevo.';
}

      await setDoc(doc(dbSecondary, 'users', cred.user.uid), {
        uid: cred.user.uid, name, email, username: normalizeUsername(user),
        points: 0, role: 'player', blocked: false, blockType: null,
        rating: null, medals: [],
        cards: await randomStarterDeck(20),
        createdAt: serverTimestamp(),
      });
      await signOut(authSecondary);
      formOk = `Cuenta creada para ${name} (usuario: ${normalizeUsername(user)}).`;
    } catch (e) {
      formError = traducirError(e.code);
    }
    busy = false;
    render(renderHome(currentProfile));
  };
  return wrap;
}

// -------- Panel: elegir qué equipos entran al sorteo del mazo inicial --------
let deckSettingsCache = null; // {allowedTeams: [...]}
async function loadDeckSettings(){
  if (deckSettingsCache) return deckSettingsCache;
  try {
    const snap = await getDoc(doc(db, 'config', 'deckSettings'));
    deckSettingsCache = snap.exists() ? snap.data() : { allowedTeams: ALL_TEAMS.slice() };
  } catch(e) {
    deckSettingsCache = { allowedTeams: ALL_TEAMS.slice() };
  }
  if (!deckSettingsCache.allowedTeams || deckSettingsCache.allowedTeams.length === 0) {
    deckSettingsCache.allowedTeams = ALL_TEAMS.slice();
  }
  return deckSettingsCache;
}
function renderDeckPoolPanel(settings){
  const allowed = new Set(settings.allowedTeams);
  const wrap = h(`<div class="panel">
    <div class="label" style="margin-bottom:12px;">Equipos habilitados para el mazo inicial (sorteo aleatorio)</div>
    <div id="team-list" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px;"></div>
    ${formError ? `<div class="err">${formError}</div>` : ''}
    ${formOk ? `<div class="ok">${formOk}</div>` : ''}
    <button class="btn btn-ghost" id="dp-save" ${busy?'disabled':''}>${busy?'Guardando…':'Guardar selección'}</button>
  </div>`);
  const list = wrap.querySelector('#team-list');
  ALL_TEAMS.forEach(team => {
    const on = allowed.has(team);
    const chip = h(`<span class="fc-team-chip" data-team="${team}" style="font-size:12px;font-family:'Space Mono',monospace;padding:6px 10px;border-radius:14px;border:1.5px solid ${on?'var(--floodlight)':'var(--pitch-line)'};color:${on?'var(--floodlight)':'var(--chalk-dim)'};background:${on?'rgba(255,209,102,0.08)':'transparent'};cursor:pointer;">${team}</span>`);
    chip.onclick = () => {
      if (allowed.has(team)) allowed.delete(team); else allowed.add(team);
      chip.style.borderColor = allowed.has(team) ? 'var(--floodlight)' : 'var(--pitch-line)';
      chip.style.color = allowed.has(team) ? 'var(--floodlight)' : 'var(--chalk-dim)';
      chip.style.background = allowed.has(team) ? 'rgba(255,209,102,0.08)' : 'transparent';
    };
    list.appendChild(chip);
  });
  wrap.querySelector('#dp-save').onclick = async () => {
    formError=''; formOk='';
    if (allowed.size === 0) { formError = 'Dejá al menos un equipo habilitado.'; render(renderHome(currentProfile)); return; }
    busy = true; render(renderHome(currentProfile));
    try {
      await setDoc(doc(db, 'config', 'deckSettings'), { allowedTeams: Array.from(allowed) });
      deckSettingsCache = { allowedTeams: Array.from(allowed) };
      formOk = 'Listo, esta selección se va a usar en los próximos mazos iniciales.';
    } catch(e) {
      formError = 'No se pudo guardar. Probá de nuevo.';
    }
    busy = false;
    render(renderHome(currentProfile));
  };
  return wrap;
}

// -------- Panel: otorgar una carta puntual a un jugador --------
let allPlayersCache = null;
async function loadAllPlayers(){
  if (allPlayersCache) return allPlayersCache;
  try {
    const snap = await getDocs(collection(db, 'users'));
    allPlayersCache = snap.docs.map(d => ({ uid: d.id, name: d.data().name, username: d.data().username || '' }));
  } catch(e) { allPlayersCache = []; }
  return allPlayersCache;
}
function renderGrantCardPanel(players){
  const wrap = h(`<div class="panel">
    <div class="label" style="margin-bottom:12px;">Otorgar una carta a un jugador</div>
    <label class="label">Jugador</label>
    <select class="input" id="gc-player">
      ${players.map(p => `<option value="${p.uid}">${p.name}${p.username ? ' (' + p.username + ')' : ''}</option>`).join('')}
    </select>
    <label class="label">Carta</label>
    <select class="input" id="gc-card">
      ${REAL_PLAYERS.map((c,i) => `<option value="${i}">${c.name} — ${c.team}</option>`).join('')}
    </select>
    <label class="label">Rareza</label>
    <select class="input" id="gc-rareza">
      <option value="normal">Normal</option>
      <option value="plata">Plata</option>
      <option value="oro">Oro</option>
    </select>
    ${formError ? `<div class="err">${formError}</div>` : ''}
    ${formOk ? `<div class="ok">${formOk}</div>` : ''}
    <button class="btn btn-ghost" id="gc-submit" ${busy?'disabled':''}>${busy?'Otorgando…':'Otorgar carta'}</button>
  </div>`);
  wrap.querySelector('#gc-submit').onclick = async () => {
    formError=''; formOk='';
    const uid = wrap.querySelector('#gc-player').value;
    const idx = parseInt(wrap.querySelector('#gc-card').value);
    const rareza = wrap.querySelector('#gc-rareza').value;
    if (!uid) { formError = 'No hay jugadores para elegir todavía.'; render(renderHome(currentProfile)); return; }
    const base = REAL_PLAYERS[idx];
    const card = { id: 'c_' + Date.now().toString(36), name: base.name, team: base.team, pos: base.pos, stats: base.stats, rareza };
    busy = true; render(renderHome(currentProfile));
    try {
      await updateDoc(doc(db, 'users', uid), { cards: arrayUnion(card) });
      formOk = `Carta "${base.name}" (${rareza}) otorgada correctamente.`;
    } catch(e) {
      formError = 'No se pudo otorgar la carta. Probá de nuevo.';
    }
    busy = false;
    render(renderHome(currentProfile));
  };
  return wrap;
}

// -------- Pantalla: perfil / inicio --------
let currentProfile = null;
function renderHome(profile){
  currentProfile = profile;
  const normales = profile.cards.filter(c => c.rareza === 'normal').length;
  const platas = profile.cards.filter(c => c.rareza === 'plata').length;
  const oros = profile.cards.filter(c => c.rareza === 'oro').length;
  const isAdmin = profile.role === 'admin';
  const wrap = h(`<div>
    <div class="top-row">
      <div class="eyebrow">Futcartas</div>
      <button class="logout-link" id="logout">Cerrar sesión</button>
    </div>
    <div class="h1" style="font-size:28px;">Hola, ${profile.name}${isAdmin ? '<span class="badge-admin">ADMIN</span>' : ''}</div>
    <div class="sub">Este es tu perfil: tus puntos y tu colección de cartas.</div>
    <div class="stat-cards">
      <div class="stat-card"><div class="num">${profile.points}</div><div class="lbl">Puntos</div></div>
      <div class="stat-card"><div class="num">${profile.cards.length}</div><div class="lbl">Cartas totales</div></div>
      <div class="stat-card"><div class="num">${platas}</div><div class="lbl">Plata</div></div>
      <div class="stat-card"><div class="num">${oros}</div><div class="lbl">Oro</div></div>
    </div>
    <button class="btn btn-primary" id="go-rooms" style="margin-bottom:16px;">Jugar en sala</button>
    <div id="admin-slot"></div>
    <div class="panel">
      <div class="label" style="margin-bottom:12px;">Tu colección (${profile.cards.length})</div>
      <div class="card-grid" id="grid"></div>
    </div>
    <div class="small-note">Los jugadores ingresan con usuario y código creados por el administrador — no hay registro abierto ni chat de texto libre entre jugadores. Próximas etapas: partidas en vivo que otorgan puntos, canje de cartas Plata/Oro e intercambios.</div>
  </div>`);
  if (isAdmin) {
    const slot = wrap.querySelector('#admin-slot');
    slot.appendChild(renderCreatePlayerPanel());
    loadDeckSettings().then(settings => { slot.appendChild(renderDeckPoolPanel(settings)); });
    loadAllPlayers().then(players => { slot.appendChild(renderGrantCardPanel(players)); });
  }
  const grid = wrap.querySelector('#grid');
  profile.cards.forEach(c => {
    grid.appendChild(h(`<div class="mini-card rareza-${c.rareza}">
      <div class="mini-name">${c.name}</div>
      <div class="mini-team">${c.pos} · ${c.team}</div>
      <div class="mini-stats">
        <span class="mini-stat">ATA ${c.stats.ata}</span>
        <span class="mini-stat">DEF ${c.stats.def}</span>
        <span class="mini-stat">PAS ${c.stats.pas}</span>
        <span class="mini-stat">REG ${c.stats.reg}</span>
        <span class="mini-stat">FIS ${c.stats.fis}</span>
      </div>
    </div>`));
  });
  wrap.querySelector('#logout').onclick = () => signOut(auth);
  wrap.querySelector('#go-rooms').onclick = () => { screen='rooms-menu'; formError=''; render(renderRoomsMenu()); };
  return wrap;
}

// ==================== SALAS DE JUEGO ====================
let currentRoomCode = null;
let currentRoomData = null;
let unsubscribeRoom = null;

function stopRoomListener(){
  if (unsubscribeRoom) { unsubscribeRoom(); unsubscribeRoom = null; }
}
function roomsKey(code){ return code; }
function generateRoomCode(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  let c = '';
  for (let i=0;i<4;i++) c += chars[Math.floor(Math.random()*chars.length)];
  return c;
}

function renderRoomsMenu(){
  const wrap = h(`<div>
    <div class="eyebrow">Futcartas</div>
    <div class="h1" style="font-size:28px;">Jugar en sala</div>
    <div class="sub">Creá una sala nueva e invitá a otros con el código, o unite a una que ya exista.</div>
    <div class="panel">
      <button class="btn btn-primary" id="rm-create" style="margin-bottom:10px;">Crear sala</button>
      <button class="btn btn-ghost" id="rm-join">Unirme con un código</button>
    </div>
    <span class="link-small" id="rm-back">Volver a mi perfil</span>
  </div>`);
  wrap.querySelector('#rm-create').onclick = () => { formError=''; render(renderRoomCreateForm()); };
  wrap.querySelector('#rm-join').onclick = () => { formError=''; render(renderRoomJoinForm()); };
  wrap.querySelector('#rm-back').onclick = () => { screen='home'; render(renderHome(currentProfile)); };
  return wrap;
}

function renderRoomCreateForm(){
  const wrap = h(`<div>
    <div class="eyebrow">Nueva sala</div>
    <div class="h1" style="font-size:28px;">Configurá la sala</div>
    <div class="panel">
      <label class="label">¿Qué se gana en cada enfrentamiento?</label>
      <div class="tabs">
        <div class="tab active" id="rw-points" data-v="points">Solo puntos</div>
        <div class="tab" id="rw-cards" data-v="points_cards">Puntos + carta del rival</div>
      </div>
      <label class="label">¿Cómo termina la sala?</label>
      <div class="tabs">
        <div class="tab active" id="dur-open" data-v="open">Abierta (yo la cierro)</div>
        <div class="tab" id="dur-fixed" data-v="fixed">Cantidad fija de rondas</div>
      </div>
      <div id="rounds-input" style="display:none;">
        <label class="label">Cantidad de rondas</label>
        <input class="input" id="rounds-n" type="number" min="1" value="3"/>
      </div>
      ${formError ? `<div class="err">${formError}</div>` : ''}
      <button class="btn btn-primary" id="rc-submit" ${busy?'disabled':''}>${busy?'Creando…':'Crear sala'}</button>
    </div>
    <span class="link-small" id="rc-back">Volver</span>
  </div>`);
  let rewardMode = 'points';
  let durationType = 'open';
  wrap.querySelector('#rw-points').onclick = () => { rewardMode='points'; wrap.querySelector('#rw-points').classList.add('active'); wrap.querySelector('#rw-cards').classList.remove('active'); };
  wrap.querySelector('#rw-cards').onclick = () => { rewardMode='points_cards'; wrap.querySelector('#rw-cards').classList.add('active'); wrap.querySelector('#rw-points').classList.remove('active'); };
  wrap.querySelector('#dur-open').onclick = () => { durationType='open'; wrap.querySelector('#dur-open').classList.add('active'); wrap.querySelector('#dur-fixed').classList.remove('active'); wrap.querySelector('#rounds-input').style.display='none'; };
  wrap.querySelector('#dur-fixed').onclick = () => { durationType='fixed'; wrap.querySelector('#dur-fixed').classList.add('active'); wrap.querySelector('#dur-open').classList.remove('active'); wrap.querySelector('#rounds-input').style.display='block'; };
  wrap.querySelector('#rc-back').onclick = () => { screen='rooms-menu'; render(renderRoomsMenu()); };
  wrap.querySelector('#rc-submit').onclick = async () => {
    formError = '';
    const fixedRounds = durationType==='fixed' ? parseInt(wrap.querySelector('#rounds-n').value) : null;
    if (durationType==='fixed' && (!fixedRounds || fixedRounds < 1)) { formError = 'Poné una cantidad de rondas válida.'; render(renderRoomCreateForm()); return; }
    busy = true; render(renderRoomCreateForm());
    const code = generateRoomCode();
    const roomDoc = {
      code, hostUid: auth.currentUser.uid, hostName: currentProfile.name,
      status: 'lobby',
      players: [{ uid: auth.currentUser.uid, name: currentProfile.name, byeCount: 0 }],
      config: { rewardMode, durationType, fixedRounds },
      round: null,
      createdAt: serverTimestamp(),
    };
    try {
      await setDoc(doc(db, 'rooms', code), roomDoc);
      openRoomLobby(code);
    } catch (e) {
      formError = 'No se pudo crear la sala. Probá de nuevo.';
      busy = false;
      render(renderRoomCreateForm());
    }
  };
  return wrap;
}

function renderRoomJoinForm(){
  const wrap = h(`<div>
    <div class="eyebrow">Unirse</div>
    <div class="h1" style="font-size:28px;">Entrá a una sala</div>
    <div class="panel">
      <label class="label">Código de sala</label>
      <input class="input" id="rj-code" placeholder="Ej: RBLM" maxlength="4" style="text-transform:uppercase; letter-spacing:0.2em; font-family:'Space Mono',monospace;"/>
      ${formError ? `<div class="err">${formError}</div>` : ''}
      <button class="btn btn-primary" id="rj-submit" ${busy?'disabled':''}>${busy?'Entrando…':'Entrar'}</button>
    </div>
    <span class="link-small" id="rj-back">Volver</span>
  </div>`);
  wrap.querySelector('#rj-back').onclick = () => { screen='rooms-menu'; render(renderRoomsMenu()); };
  wrap.querySelector('#rj-submit').onclick = async () => {
    formError = '';
    const code = wrap.querySelector('#rj-code').value.trim().toUpperCase();
    if (code.length < 4) { formError = 'Ingresá el código completo.'; render(renderRoomJoinForm()); return; }
    busy = true; render(renderRoomJoinForm());
    try {
      const snap = await getDoc(doc(db, 'rooms', code));
      if (!snap.exists()) { formError = 'No encontramos esa sala.'; busy=false; render(renderRoomJoinForm()); return; }
      const data = snap.data();
      if (data.status !== 'lobby') { formError = 'Esa sala ya empezó o terminó.'; busy=false; render(renderRoomJoinForm()); return; }
      if (!data.players.find(p => p.uid === auth.currentUser.uid)) {
        await updateDoc(doc(db, 'rooms', code), {
          players: arrayUnion({ uid: auth.currentUser.uid, name: currentProfile.name, byeCount: 0 })
        });
      }
      openRoomLobby(code);
    } catch (e) {
      formError = 'No se pudo unir a la sala. Probá de nuevo.';
      busy = false;
      render(renderRoomJoinForm());
    }
  };
  return wrap;
}

function openRoomLobby(code){
  stopRoomListener();
  currentRoomCode = code;
  screen = 'room-lobby';
  busy = false;
  unsubscribeRoom = onSnapshot(doc(db, 'rooms', code), (snap) => {
    if (!snap.exists()) return;
    currentRoomData = snap.data();
    if (currentRoomData.status === 'lobby') {
      if (screen === 'room-lobby' || screen === 'room-playing') { screen='room-lobby'; render(renderRoomLobby(currentRoomData)); }
    } else if (currentRoomData.status === 'playing') {
      screen = 'room-playing';
      render(renderRoomPlayingPlaceholder(currentRoomData));
    }
  });
}

function renderRoomPlayingPlaceholder(data){
  const wrap = h(`<div>
    <div class="eyebrow">Sala ${data.code} · en juego</div>
    <div class="h1" style="font-size:26px;">¡La sala ya arrancó!</div>
    <div class="panel">
      <div class="small-note">La mecánica de rondas (sorteo de parejas, mano, categoría y resultado) es el próximo paso que vamos a construir — todavía no está activa en esta versión. Por ahora, esta pantalla solo confirma que la sala pasó a estado "jugando" correctamente.</div>
    </div>
    <span class="link-small" id="rp-leave">Salir de la sala</span>
  </div>`);
  wrap.querySelector('#rp-leave').onclick = () => {
    stopRoomListener();
    currentRoomCode = null; currentRoomData = null;
    screen = 'home'; render(renderHome(currentProfile));
  };
  return wrap;
}

function renderRoomLobby(data){
  const isHost = data.hostUid === auth.currentUser.uid;
  const rewardLabel = data.config.rewardMode === 'points_cards' ? 'Puntos + carta del rival' : 'Solo puntos';
  const durationLabel = data.config.durationType === 'fixed' ? `${data.config.fixedRounds} ronda(s)` : 'Abierta (la cierra el creador)';
  const wrap = h(`<div>
    <div class="eyebrow">Sala de espera</div>
    <div class="h1" style="font-size:28px;">Futcartas</div>
    <div class="code-display" style="font-family:'Space Mono',monospace; font-size:38px; font-weight:700; letter-spacing:0.15em; text-align:center; color:var(--floodlight); background:rgba(0,0,0,0.3); border:2px dashed var(--pitch-line); border-radius:12px; padding:14px 0; margin:10px 0 18px;">${data.code}</div>
    <div class="small-note" style="margin-bottom:16px;">Compartí este código para que se sumen. Premio: <b style="color:var(--chalk)">${rewardLabel}</b> · Duración: <b style="color:var(--chalk)">${durationLabel}</b></div>
    <div class="panel">
      <label class="label">Jugadores (${data.players.length})</label>
      ${data.players.map(p => `<div class="fc-player-row" style="display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--pitch-line);font-size:14.5px;">
        <span style="width:8px;height:8px;border-radius:50%;background:#4CD97D;box-shadow:0 0 6px #4CD97D;"></span>
        ${p.name}${p.uid===data.hostUid?'<span class="badge-admin" style="background:var(--floodlight);color:#1A1200;">HOST</span>':''}
      </div>`).join('')}
    </div>
    ${isHost ? `<button class="btn btn-primary" id="rl-start" ${data.players.length<2?'disabled':''}>Iniciar sala</button>
    ${data.players.length<2 ? '<div class="small-note">Necesitás al menos 2 jugadores.</div>' : ''}` :
    `<div class="small-note">Esperando a que ${data.hostName} inicie la sala…</div>`}
    <span class="link-small" id="rl-leave">Salir de la sala</span>
  </div>`);
  if (isHost) {
    wrap.querySelector('#rl-start').onclick = async () => {
      await updateDoc(doc(db, 'rooms', data.code), { status: 'playing' });
    };
  }
  wrap.querySelector('#rl-leave').onclick = () => {
    stopRoomListener();
    currentRoomCode = null; currentRoomData = null;
    screen = 'home'; render(renderHome(currentProfile));
  };
  return wrap;
}

onAuthStateChanged(auth, async (user) => {
  if (!user) { screen='player-login'; render(renderPlayerLogin()); return; }
  render(h(`<div class="spinner">Cargando tu perfil…</div>`));
  try {
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (snap.exists()) {
      render(renderHome(snap.data()));
    } else {
      const fallback = {
        uid: user.uid, name: user.displayName || 'Jugador', email: user.email,
        points: 0, role: 'player', blocked: false, blockType: null,
        rating: null, medals: [], cards: await randomStarterDeck(20),
      };
      await setDoc(doc(db, 'users', user.uid), { ...fallback, createdAt: serverTimestamp() });
      render(renderHome(fallback));
    }
  } catch (e) {
    render(h(`<div class="panel"><div class="err">No se pudo cargar tu perfil: ${e.message}</div></div>`));
  }
});
</script>
